<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JPDB Immersion Kit Examples Options</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <header class="page-header">
        <div>
            <h1>JPDB Immersion Kit Examples</h1>
            <p>Extension Options</p>
        </div>
    </header>

    <main>
        <form id="options-form">
            <section class="settings-section" aria-labelledby="display-heading">
                <h2 id="display-heading">Display</h2>
                <div id="display-settings" class="settings-list"></div>
            </section>

            <section class="settings-section" aria-labelledby="behavior-heading">
                <h2 id="behavior-heading">Behavior</h2>
                <div id="behavior-settings" class="settings-list"></div>
            </section>

            <section class="settings-section" aria-labelledby="audio-heading">
                <h2 id="audio-heading">Custom Example Audio</h2>
                <div id="custom-audio-settings" class="settings-list"></div>
            </section>

            <div class="actions">
                <button type="button" id="reset-button" class="danger">Reset</button>
                <span id="save-status" role="status" aria-live="polite"></span>
                <button type="submit" id="save-button">Save</button>
            </div>
        </form>
    </main>

    <script src="settings.js"></script>
    <script src="options.js"></script>
</body>
</html>
